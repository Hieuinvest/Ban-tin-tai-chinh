name: "Tạo bản tin TTCK hằng ngày"
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Cài đặt Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Cài đặt thư viện phụ thuộc
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Thu thập dữ liệu nguồn
      run: |
        python scripts/fetch_sources.py > raw_sources.txt
        echo "--- Xem trước raw_sources.txt ---"
        head -n 40 raw_sources.txt
    - name: Gọi Claude tạo bản tin
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        python scripts/generate_newsletter.py
    - name: Commit và Đẩy bản tin mới lên GitHub
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add bantin/
        git diff-index --quiet HEAD || (git commit -m "Tự động cập nhật bản tin ngày $(date +'%Y-%m-%d')" && git push)
