name: Tạo bản tin TTCK hằng ngày

on:
  schedule:
    # 01:00 UTC = 08:00 giờ Việt Nam (UTC+7)
    - cron: "0 1 * * *"
  workflow_dispatch: {}   # cho phép bấm nút "Run workflow" để chạy thử thủ công

permissions:
  contents: write

jobs:
  build-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cài thư viện
        run: pip install -r requirements.txt

      - name: Lấy dữ liệu nguồn
        run: python3 scripts/fetch_sources.py > raw_sources.txt

      - name: Tổng hợp bản tin bằng Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/generate_newsletter.py

      - name: Commit và push bản tin mới
        run: |
          git config user.name "ban-tin-bot"
          git config user.email "actions@github.com"
          git add bantin/
          git diff --staged --quiet || git commit -m "Bản tin tự động $(date -u +'%Y-%m-%d')"
          git push
